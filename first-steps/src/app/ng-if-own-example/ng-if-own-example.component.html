<p>My Own NgIf Example</p>
<div *ngIf="editable; else notEditable">
  <p>{{ message }}</p>
</div>
<ng-template #notEditable>
  <p>{{ message }}</p>
</ng-template>
<p [contentEditable]="false" id="content_paragraph" #contentParagraph>
  Editable
</p>
<p>{{ content }}</p>
<button
  type="button"
  (click)="changeEditability()"
  class="p-1 border border-solid bg-red-600 text-white rounded-md hover:bg-white hover:text-red-600 hover:border-red-600"
>
  Change editability
</button>
