<h2>Hello World: ngIf!</h2>

<button
  type="button"
  (click)="onEditClick()"
  class="p-1 border border-solid bg-red-600 text-white rounded-md hover:bg-white hover:text-red-600 hover:border-red-600"
>
  Make text editable!
</button>

<div *ngIf="canEdit; else noEdit">
  <p>You can edit the following paragraph.</p>
</div>

<ng-template #noEdit>
  <p>The following paragraph is read only. Try clicking the button!</p>
</ng-template>

<p [contentEditable]="canEdit">{{ message }}</p>
